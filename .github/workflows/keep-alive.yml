name: Keep Streamlit App Alive

on:
  schedule:
    # 3時間ごとに実行（UTC時間で指定）
    # 例: 0時、3時、6時、9時、12時、15時、18時、21時（UTC）
    - cron: '0 */3 * * *'
  
  # 手動実行を可能にする
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ping Streamlit App
      run: |
        echo "🔄 Pinging Streamlit app to keep it alive..."
        echo "Current time: $(date)"
        
        # アプリのURLにアクセス（スリープ解除のため長めのタイムアウトを設定）
        response=$(curl -s -o /dev/null -w "%{http_code}" https://ichijo-3dmaker.streamlit.app/ --max-time 120 || echo "timeout")
        
        # 2xxまたは3xxステータスコードを成功とみなす（Streamlitは303リダイレクトを返す）
        if [ "$response" = "timeout" ]; then
          echo "⚠️ Request timed out (app may be waking up from sleep). This is non-fatal."
        elif [ "$response" -ge 200 ] && [ "$response" -lt 400 ]; then
          echo "✅ Successfully pinged app (HTTP $response)"
        else
          echo "⚠️ Received HTTP code: $response (non-fatal)"
        fi
        
        echo "Completed at $(date)"
