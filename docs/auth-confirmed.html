<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会員登録完了 | 3D Maker</title>
  <meta name="description" content="会員登録のメール認証が完了しました。">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .completion-wrap {
      max-width: 560px;
      margin: 64px auto 0;
      text-align: center;
      padding: 0 16px;
    }
    .icon-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #e6f4ea;
      margin-bottom: 24px;
    }
    .icon-circle svg {
      width: 40px;
      height: 40px;
    }
    .completion-wrap h1 {
      font-size: 22px;
      margin: 0 0 12px;
      color: #1a1a1a;
    }
    .completion-wrap p {
      font-size: 15px;
      color: #555;
      line-height: 1.7;
      margin: 0 0 32px;
    }
    .step-box {
      background: #f7f9fb;
      border: 1px solid #e0e7ef;
      border-radius: 8px;
      padding: 20px 24px;
      text-align: left;
      margin-bottom: 32px;
    }
    .step-box p {
      margin: 0;
      font-size: 14px;
      color: #444;
    }
    .step-box ol {
      margin: 10px 0 0 0;
      padding-left: 20px;
      font-size: 14px;
      color: #444;
      line-height: 1.8;
    }
    .hint {
      font-size: 13px;
      color: #888;
      margin-top: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>3D Maker</h1>
    </div>
  </header>

  <main>
    <div class="completion-wrap">
      <div class="icon-circle">
        <!-- チェックマークアイコン -->
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="11" stroke="#34a853" stroke-width="2"/>
          <path d="M7 12.5l3.5 3.5 6-7" stroke="#34a853" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <h1>メール認証が完了しました</h1>
      <p>
        会員登録のメールアドレス確認が正常に完了しました。<br>
        引き続き、アプリページからログインしてご利用ください。
      </p>

      <div class="step-box">
        <p><strong>次のステップ</strong></p>
        <ol>
          <li>アプリページに戻る（または再度アクセスする）</li>
          <li>ページを更新（F5 / ⌘R）する</li>
          <li>登録したメールアドレスとパスワードでログインする</li>
        </ol>
      </div>

      <a class="btn primary" href="https://ichijo-3dmaker.streamlit.app/" rel="noopener">アプリページへ戻る</a>

      <p class="hint" style="margin-top:24px;">
        ※ ログインできない場合は、ページを一度閉じてから再度アクセスしてお試しください。
      </p>
    </div>
  </main>

  <footer class="site-footer" style="margin-top:64px;">
    <div class="container">
      <p>&copy; 2025 3D Maker. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
